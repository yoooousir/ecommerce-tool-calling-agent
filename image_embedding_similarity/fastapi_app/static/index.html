<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>이미지 유사도 검색</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; color: #222; }
  h1 { font-size: 22px; }
  #dropzone {
    border: 2px dashed #999; border-radius: 10px; padding: 40px;
    text-align: center; cursor: pointer; color: #666; margin-bottom: 20px;
  }
  #dropzone.dragover { border-color: #4a7dff; background: #f0f5ff; }
  #preview { max-width: 220px; max-height: 220px; margin: 10px auto; display: none; border-radius: 8px; }
  #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-top: 20px; }
  .card { border: 1px solid #eee; border-radius: 8px; padding: 8px; text-align: center; }
  .card img { width: 100%; height: 140px; object-fit: cover; border-radius: 6px; }
  .card .score { font-size: 12px; color: #4a7dff; margin-top: 6px; }
  .card .title { font-size: 12px; color: #444; margin-top: 4px; height: 32px; overflow: hidden; }
  #status { font-size: 13px; color: #888; margin-top: 8px; }
</style>
</head>
<body>
  <h1>이미지 업로드 → 유사 상품 검색</h1>
  <div id="dropzone">
    이미지를 여기에 드래그하거나 클릭해서 업로드하세요
    <input type="file" id="fileInput" accept="image/*" style="display:none" />
  </div>
  <img id="preview" />
  <div id="status"></div>
  <div id="results"></div>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const preview = document.getElementById('preview');
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');

  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length) handleFile(e.target.files[0]);
  });

  async function handleFile(file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    resultsEl.innerHTML = '';
    statusEl.textContent = '검색 중...';

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch('/search?top_k=8', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.error) {
        statusEl.textContent = '오류: ' + data.error;
        return;
      }
      statusEl.textContent = `${data.results.length}개 유사 상품을 찾았습니다.`;
      renderResults(data.results);
    } catch (err) {
      statusEl.textContent = '요청 실패: ' + err;
    }
  }

  function renderResults(results) {
    resultsEl.innerHTML = results.map(r => `
      <div class="card">
        <img src="${r.image_url}" onerror="this.style.opacity=0.2" />
        <div class="title">${r.title || r.product_id || ''}</div>
        <div class="score">score: ${r.score}</div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
