# schema.yml (v2)
# ============================================================
# [v2 변경사항]
#   - has_image 컬럼 제거로 관련 테스트 제거
#   - image_url, description 관련 항목 제거
# ============================================================

version: 2

models:
  - name: dim_products
    description: "쇼핑 에이전트의 RDBMS 조건 검색 대상 최종 상품 카탈로그 (v2: S3 분리 후)"
    columns:
      - name: product_id
        description: "상품 고유 ID"
        tests:
          - unique
          - not_null
      - name: link
        description: "상품 상세 페이지 URL"
        tests:
          - unique
          - not_null
      - name: low_price
        description: "최저가 (원)"
        tests:
          - not_null
      - name: price_bucket
        description: "가격 구간 (budget/mid/premium)"
        tests:
          - accepted_values:
              values: ['budget', 'mid', 'premium']

  - name: category_summary
    description: "카테고리별 수집 현황 요약"
    columns:
      - name: category_l1
        description: "대분류 카테고리명"
        tests:
          - unique
      - name: product_count
        description: "해당 카테고리 상품 수"
        tests:
          - not_null